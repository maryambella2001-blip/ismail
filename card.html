<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - fabyou</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f5f5f5;
        }
        .cart-item {
            background: white;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        button {
            background: #e63946;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .total {
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
        }
        .checkout-box {
            background: white;
            padding: 25px;
            margin-top: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        input {
            display: block;
            width: 100%;
            margin-bottom: 12px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }
        .item-info {
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>🛒 Shopping Cart</h1>

    <div id="cart"></div>

    <div class="total">
        Total: <span id="total">0</span> DH
    </div>

    <div class="checkout-box">
        <h3>Checkout</h3>
        <input id="name" type="text" placeholder="Your Name">
        <input id="phone" type="text" placeholder="Phone Number">
        <input id="address" type="text" placeholder="Address">
        <button onclick="sendOrder()">Confirm Order via WhatsApp</button>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        function renderCart() {
            let total = 0;
            const container = document.getElementById("cart");

            container.innerHTML = cart.map((item, index) => {
                total += item.price;

                let extra = "";
                if (item.customName) extra += `<p><strong>Name:</strong> ${item.customName}</p>`;
                if (item.color) extra += `<p><strong>Color:</strong> ${item.color}</p>`;
                if (item.size) extra += `<p><strong>Size:</strong> ${item.size}</p>`;

                return `
                    <div class="cart-item">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <p><strong>${item.price} DH</strong></p>
                            ${extra}
                        </div>
                        <button onclick="removeItem(${index})">Delete</button>
                    </div>
                `;
            }).join("");

            document.getElementById("total").innerText = total;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        function sendOrder() {
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const address = document.getElementById("address").value;

            if (!name || !phone || !address) {
                alert("Please fill in all fields!");
                return;
            }

            let message = `🛒 NEW ORDER\n\n`;
            message += `Name: ${name}\n`;
            message += `Phone: ${phone}\n`;
            message += `Address: ${address}\n\n`;
            message += `Products:\n`;

            let total = 0;

            cart.forEach(item => {
                message += `- ${item.name}`;
                if (item.customName) message += ` | Name: ${item.customName}`;
                if (item.color) message += ` | Color: ${item.color}`;
                if (item.size) message += ` | Size: ${item.size}`;
                message += ` (${item.price} DH)\n`;
                total += item.price;
            });

            message += `\nTotal: ${total} DH`;

            const whatsappNumber = "212773300654";
            const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, "_blank");
        }

        renderCart();
    </script>
